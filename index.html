  <div class="stats-bar">
    <div class="stat">
      <span class="stat-number" id="stat-total">–</span>
      <span class="stat-label">Festivals</span>

    <div class="stat">

      <span class="stat-label">Tage bis nächstes</span>
    </div>
    <div class="stat">

  <div class="controls">

      <input
        type="text"
        class="search-input"
        id="search"
        placeholder="// FESTIVAL ODER ORT SUCHEN..."
        autocomplete="off"
        spellcheck="false"
      />
      <select class="month-select" id="month-filter">
        <option value="">ALLE MONATE</option>
        <option value="1">JAN</option>
        <option value="2">FEB</option>
        <option value="3">MÄR</option>
        <option value="4">APR</option>
        <option value="5">MAI</option>
        <option value="6">JUN</option>
        <option value="7">JUL</option>
        <option value="8">AUG</option>
        <option value="9">SEP</option>
        <option value="10">OKT</option>
        <option value="11">NOV</option>
        <option value="12">DEZ</option>
      </select>
    </div>

    <button class="reset-btn" id="reset-filters">✕ FILTER ZURÜCKSETZEN</button>

    <div class="genre-filters">
      <span class="genre-label">// GENRE:</span>
      <div class="genre-btn-scroll">
        <button class="genre-btn active" data-genre="all">ALLE</button>
        <button class="genre-btn" data-genre="Techno">TECHNO</button>
        <button class="genre-btn" data-genre="Hard Techno">HARD TECHNO</button>
        <button class="genre-btn" data-genre="Schranz">SCHRANZ</button>
        <button class="genre-btn" data-genre="Hardstyle">HARDSTYLE</button>

    </div>

  <main class="main-content">
    <div class="section-label">
      <span>// BEVORSTEHENDE FESTIVALS</span>
      <span class="count" id="upcoming-count"></span>
    </div>
    <div class="festival-grid" id="festival-grid">
      <!-- Cards rendered by JS -->
    </div>

  </main>

  <footer>
    <span class="footer-skull">☠️</span>

  </footer>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scroll-top" aria-label="Nach oben">▲</button>

  <script type="module">
    import festivals from './data/festivals.js';

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // ─── STATE ───
    let activeGenre = 'all';
    let searchQuery = '';
    let monthFilter = '';
    let upcomingOnly = false;

    // ─── HELPERS ───

    function getDaysUntil(dateStr) {
      const d = new Date(dateStr);
      d.setHours(0, 0, 0, 0);
      return Math.round((d - today) / (1000 * 60 * 60 * 24));
    }

    function getStatus(f) {
      if (f.soldOut) return 'sold-out';
      const days = getDaysUntil(f.date);
      if (days < 0) return 'past';
      if (days <= 30) return 'soon';
      return 'upcoming';
    }

    function getCountdownText(f) {
      const days = getDaysUntil(f.date);
      if (days < 0) return `vor ${Math.abs(days)} Tagen`;
      if (days === 0) return 'HEUTE !!!';
      if (days === 1) return 'MORGEN';
      return `in ${days} Tagen`;
    }

    function getCountdownClass(f) {
      const days = getDaysUntil(f.date);
      if (days < 0) return 'past';
      if (days <= 7) return 'very-soon';
      if (days <= 30) return 'soon';
      return '';
    }

    function getStatusBadge(status) {
      const map = {
        'upcoming': ['BEVORSTEHEND', 'badge-upcoming'],
        'soon': ['BALD', 'badge-soon'],
        'past': ['VERGANGEN', 'badge-past'],
        'sold-out': ['AUSVERKAUFT', 'badge-sold-out']
      };
      return map[status] || map['upcoming'];
    }

    function getTagClass(genre) {
      const map = {
        'Hard Techno': 'tag-hard-techno',
        'Schranz': 'tag-schranz',
        'Techno': 'tag-techno',
        'Hardcore': 'tag-hardcore',
        'Hardstyle': 'tag-hardstyle',
        'Trance': 'tag-trance',
        'Psytrance': 'tag-psytrance',
        'EDM': 'tag-edm',
        'Experimental': 'tag-experimental',
        'House': 'tag-house'
      };
      return map[genre] || '';
    }

    // ─── RENDER CARD ───

    function renderCard(f) {
      const status = getStatus(f);
      const [badgeText, badgeClass] = getStatusBadge(status);
      const countdown = getCountdownText(f);
      const countdownClass = getCountdownClass(f);

      const tags = f.genre.map(g =>
        `<span class="genre-tag ${getTagClass(g)}">${g.toUpperCase()}</span>`
      ).join('');

      return `
        <article class="card status-${status}">
          <div class="card-inner">
            <div class="card-header">
              <h2 class="card-name">${f.name}</h2>
              <span class="card-status-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="genre-tags">${tags}</div>
            <div class="card-meta">
              <div class="meta-row">
                <span class="meta-icon">▶</span>
                <span class="meta-value">${f.dateDisplay}</span>
              </div>
              <div class="meta-row">
                <span class="meta-icon">◈</span>
                <span class="meta-value">${f.location}</span>
              </div>
            </div>
            <p class="card-description">${f.description}</p>
            <div class="card-footer">
              <span class="countdown ${countdownClass}">${countdown}</span>
              ${f.url ? `<a class="visit-btn" href="${f.url}" target="_blank" rel="noopener noreferrer">ZUR WEBSITE →</a>` : ''}
            </div>
          </div>
        </article>
      `;
    }

    // ─── FILTER ───

    function filterFestivals() {
      return festivals.filter(f => {
        const q = searchQuery.toLowerCase();
        const matchSearch = !q ||
          f.name.toLowerCase().includes(q) ||
          f.location.toLowerCase().includes(q);

        const matchGenre = activeGenre === 'all' ||
          f.genre.some(g => g.toLowerCase() === activeGenre.toLowerCase());

        const matchMonth = !monthFilter ||
          new Date(f.date).getMonth() + 1 === parseInt(monthFilter);

        const status = getStatus(f);
        const matchUpcoming = !upcomingOnly || status !== 'past';

        return matchSearch && matchGenre && matchMonth && matchUpcoming;
      });
    }

    // ─── RENDER ───

    function render() {
      const filtered = filterFestivals();

      const upcoming = filtered.filter(f => getStatus(f) !== 'past');
      upcoming.sort((a, b) => new Date(a.date) - new Date(b.date));

      const grid = document.getElementById('festival-grid');
      const upcomingCountEl = document.getElementById('upcoming-count');

      if (upcoming.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>// KEINE TREFFER</h3>
            <p>Kein Festival passt zu deiner Suche. Vielleicht stirbst du doch auf dem Sofa.</p>
          </div>`;
      } else {
        grid.innerHTML = upcoming.map(renderCard).join('');
      }

      upcomingCountEl.textContent = `[${upcoming.length}]`;

      updateStats();
    }

    // ─── STATS ───

    function updateStats() {
      const allUpcoming = festivals.filter(f => getStatus(f) !== 'past');
      allUpcoming.sort((a, b) => new Date(a.date) - new Date(b.date));

      document.getElementById('stat-total').textContent = allUpcoming.length;

      const genres = new Set(festivals.flatMap(f => f.genre));
      document.getElementById('stat-genres').textContent = genres.size;

      if (allUpcoming.length > 0) {
        const nextDays = getDaysUntil(allUpcoming[0].date);
        document.getElementById('stat-next-days').textContent =
          nextDays <= 0 ? 'HEUTE' : nextDays;
      } else {
        document.getElementById('stat-next-days').textContent = '–';
      }
    }

    // ─── EVENT LISTENERS ───

    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    document.getElementById('month-filter').addEventListener('change', e => {
      monthFilter = e.target.value;
      render();
    });


    document.querySelectorAll('.genre-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeGenre = btn.dataset.genre;
        render();
      });
    });


    // ─── FILTER RESET ───
    document.getElementById('reset-filters').addEventListener('click', () => {
      searchQuery = '';
      activeGenre = 'all';
      monthFilter = '';
      document.getElementById('search').value = '';
      document.getElementById('month-filter').value = '';
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.genre-btn[data-genre="all"]').classList.add('active');
      render();
    });

    // ─── SCROLL TO TOP ───
    const scrollBtn = document.getElementById('scroll-top');
    window.addEventListener('scroll', () => {
      scrollBtn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    scrollBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ─── INIT ───
    render();
  </script>
